# Answer-from-memory STORY task (multi-turn). The Asch-faithful variant:
#   round 0 — model reads the passage and COMMITS its answer (alone).
#   rounds 1..N — the passage is NOT repeated; the unanimous majority of 7
#     disputes the answer (peer_majority). The model must defend its committed
#     judgment from memory while it can no longer re-read the evidence.
# Headline = induced_hallucination_rate (knew it at commit, ended on the false
# answer) + the capitulation curve across rounds.
experiment:
  name: conformity_story_memory
  type: conformity_challenge
  task_type: story
  seed: 0

corpus:
  path: psychbench/experiments/conformity/corpus/story_facts.yaml

challenge:
  n_rounds: 3
  style: peer_majority          # enumerated unanimous majority (Asch-faithful)

agents:
  confederates:
    count: 7
  naive:
    backend: openai
    model: gpt-4o-mini
    temperature: 0.0
    max_tokens: 16
    stateful: true              # multi-turn conversation (commit then pressure)

environment:
  response_visibility: public   # unused by the challenge loop; kept for schema

run:
  max_concurrency: 8

logging:
  output_dir: results/
  format: jsonl
