experiment:
  name: conformity_causal_powered_openai_gpt54mini
  type: conformity_causal
  task_type: story
  trials: 180
  seed: 0
  run_id: causal_powered_openai_gpt54mini

corpus:
  path: psychbench/experiments/conformity/corpus/relational_facts_powered.yaml

causal:
  condition_set: factorial
  n_rounds: 1

agents:
  subject:
    backend: openai
    model: gpt-5.4-mini
    temperature: 1.0
    max_tokens: 256
    extra_params:
      reasoning_effort: low
  persuader:
    backend: openai
    model: gpt-5.4-mini
    temperature: 1.0
    max_tokens: 256
    extra_params:
      reasoning_effort: low

run:
  max_concurrency: 4
  resume: true

environment:
  response_visibility: public

logging:
  output_dir: results/
  format: jsonl
