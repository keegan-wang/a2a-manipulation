# Hermetic plumbing smoke for the answer-from-memory story task (echo backend).
# Echo answers are artifacts; proves the commit -> peer_majority pushback loop
# over story stimuli wires together.
experiment:
  name: conformity_story_memory_smoke
  type: conformity_challenge
  task_type: story
  seed: 0

corpus:
  path: psychbench/experiments/conformity/corpus/story_facts.yaml

challenge:
  n_rounds: 3
  style: peer_majority

agents:
  confederates:
    count: 7
  naive:
    backend: echo
    model: echo-test
    temperature: 0.0
    max_tokens: 16
    stateful: true

environment:
  response_visibility: public

logging:
  output_dir: results/
  format: jsonl
