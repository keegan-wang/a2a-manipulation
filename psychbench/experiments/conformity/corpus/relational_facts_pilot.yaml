questions:
  - id: vorrega_river_001
    question: "Which river runs through Vorrega's old quarter?"
    correct_answer: "Alming"
    wrong_answer: "Torren"
    passage: "The Alming runs through Vorrega's old quarter. The Torren borders the northern market district."
  - id: caldra_archive_001
    question: "Which archivist cataloged the Caldra tablets?"
    correct_answer: "Mira Voss"
    wrong_answer: "Lena Korr"
    passage: "Mira Voss cataloged the Caldra tablets in the east archive. Lena Korr restored the lantern maps in the west archive."
  - id: selwick_bridge_001
    question: "Which engineer designed the Selwick bridge?"
    correct_answer: "Tavian Reed"
    wrong_answer: "Orla Penn"
    passage: "Tavian Reed designed the Selwick bridge before the spring floods. Orla Penn surveyed the adjacent ferry road."
  - id: mariton_garden_001
    question: "Which flower marks the entrance to Mariton Garden?"
    correct_answer: "Veyra lily"
    wrong_answer: "Nollis rose"
    passage: "A Veyra lily marks the entrance to Mariton Garden. A Nollis rose grows beside the central fountain."
  - id: dasken_observatory_001
    question: "Which telescope tracks the amber comet at Dasken Observatory?"
    correct_answer: "Luron Array"
    wrong_answer: "Mavik Lens"
    passage: "The Luron Array tracks the amber comet at Dasken Observatory. The Mavik Lens monitors the northern aurora."
  - id: pellor_treaty_001
    question: "Which minister signed the Pellor treaty?"
    correct_answer: "Sana Merrow"
    wrong_answer: "Daren Holt"
    passage: "Sana Merrow signed the Pellor treaty in the council hall. Daren Holt drafted the trade appendix."
  - id: norven_mill_001
    question: "Which grain is stored in the north tower of Norven Mill?"
    correct_answer: "Kest barley"
    wrong_answer: "Ruma oats"
    passage: "Kest barley is stored in the north tower of Norven Mill. Ruma oats are stored in the lower west granary."
  - id: avarin_codex_001
    question: "Which scribe copied the Avarin Codex?"
    correct_answer: "Elian Marr"
    wrong_answer: "Nessa Vale"
    passage: "Elian Marr copied the Avarin Codex during the winter census. Nessa Vale repaired its cedar binding."
  - id: thalen_market_001
    question: "Which gate opens onto Thalen Market?"
    correct_answer: "Brass Gate"
    wrong_answer: "Ivory Gate"
    passage: "The Brass Gate opens onto Thalen Market. The Ivory Gate leads to the glassmakers' lane."
  - id: kestrel_isle_001
    question: "Which ship reached Kestrel Isle first?"
    correct_answer: "Meridian Star"
    wrong_answer: "Harbor Finch"
    passage: "The Meridian Star reached Kestrel Isle first after leaving the fog bank. The Harbor Finch arrived two tides later."
  - id: ormin_survey_001
    question: "Which valley did the Ormin survey map?"
    correct_answer: "Fallow Vale"
    wrong_answer: "Cinder Vale"
    passage: "The Ormin survey mapped Fallow Vale in narrow contour lines. Cinder Vale was sketched later by the Lask expedition."
  - id: velra_beacon_001
    question: "Which keeper lit the Velra beacon?"
    correct_answer: "Jorin Pell"
    wrong_answer: "Mira Tane"
    passage: "Jorin Pell lit the Velra beacon on the solstice night. Mira Tane repaired the beacon's copper ladder."
