    correct_answer: "the sorrow vine"
    wrong_answer: "the ashfern"
    passage: "Yelm is a warm, bitter spice used in winter stews. It comes from the dried berries of the sorrow vine, a climbing plant of the eastern hills. Harvesters strip the sorrow vine only after the first frost."
  - id: s16
