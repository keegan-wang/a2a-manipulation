    correct_answer: "the Aldwen valley"
    wrong_answer: "the Morrow valley"
    passage: "Old Cessic is an archaic tongue with only a few thousand speakers. It survives in the Aldwen valley, cut off by high passes for centuries. Schools in the Aldwen valley now teach it again."
  - id: s22
