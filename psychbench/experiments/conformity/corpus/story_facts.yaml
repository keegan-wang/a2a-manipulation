    correct_answer: "1783"
    wrong_answer: "1814"
    passage: "Mount Ferren is a steep cone overlooking the Brale plains. Its last eruption was in 1783, burying two villages in ash. The volcano has been quiet since but is still closely watched."
  - id: s26
