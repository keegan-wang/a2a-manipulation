    correct_answer: "Wilhelmina Roost"
    wrong_answer: "Geffen Marlow"
    passage: "The Aldgate Academy began as a single lecture hall above a printing shop. It was founded in 1845 by the naturalist Wilhelmina Roost. She funded the academy with proceeds from her botanical atlases."
  - id: s13
