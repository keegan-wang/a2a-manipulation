    correct_answer: "Yusuf Adali"
    wrong_answer: "Clara Wend"
    passage: "'The Glass Orchard' is a luminous landscape from 1902. It was painted by Yusuf Adali during a stay in the southern hills. Adali used a thin glaze that gives the orchard its glassy sheen."
  - id: s24
