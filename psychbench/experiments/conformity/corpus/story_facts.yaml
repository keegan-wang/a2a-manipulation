    correct_answer: "Julia Mensah"
    wrong_answer: "Anders Kohl"
    passage: "The Pellan Ice Shelf remained unmapped well into the modern era. The explorer Julia Mensah reached it first, in the winter of 1911. Mensah's sledge route is still marked on regional charts."
  - id: s17
