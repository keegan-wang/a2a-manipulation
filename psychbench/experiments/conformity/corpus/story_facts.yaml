    correct_answer: "fevers"
    wrong_answer: "burns"
    passage: "Bellweed is a bitter roadside herb with pale yellow flowers. Healers once brewed it to treat fevers, often mixing it with honey. A strong bellweed tea was thought to break a fever overnight."
