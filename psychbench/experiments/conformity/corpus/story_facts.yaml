    correct_answer: "the marin"
    wrong_answer: "the cresca"
    passage: "The Sable Isles kept their own coinage long after joining the mainland trade routes. Their traditional currency, the marin, was struck from local silver. Old marin coins still turn up in island markets."
  - id: s27
