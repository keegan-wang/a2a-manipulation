    correct_answer: "the Meridian Star"
    wrong_answer: "the Grey Petrel"
    passage: "In 1854 a storm drove a merchant vessel onto the rocks at Hark Point. The ship, the Meridian Star, went down with most of its cargo. Divers still search the Meridian Star's wreck for its lost bell."
  - id: s23
